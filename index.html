function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toCSV(dataObj) {
  const rows = [];
  // Flatten: one row per trial, with shared columns prepended
  const shared = {
    participant: dataObj.participant,
    date: dataObj.date,
    consent: dataObj.consent,
  };

  // Demographics
  for (const [k, v] of Object.entries(dataObj.demographics)) {
    shared[`demo_${k}`] = v;
  }

  // IRI
  for (const [k, v] of Object.entries(dataObj.iri)) {
    shared[`iri_${k}`] = v;
  }

  if (dataObj.trials.length === 0) {
    rows.push(shared);
  } else {
    for (const t of dataObj.trials) {
      rows.push({ ...shared, ...t });
    }
  }

  const headers = [...new Set(rows.flatMap(r => Object.keys(r)))];
  const csvLines = [headers.join(',')];
  for (const row of rows) {
    csvLines.push(headers.map(h => {
      const val = row[h] ?? '';
      const s = String(val).replace(/"/g, '""');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
    }).join(','));
  }
  return csvLines.join('\n');
}

async function saveData() {
  console.log("saveData() called");
  const csv = toCSV(allData);
  const filename = `Robot_Eval_${participantID}_${new Date().toISOString().replace(/[:.]/g, '-')}.csv`;
  console.log("CSV length:", csv.length);
  try {
    console.log("Uploading to DataPipe...");
    console.log({
      experimentID: DATAPIPE_EXPERIMENT_ID,
      filename
    });
    console.log("About to call fetch()");
    console.log(csv)
    const resp = await fetch("https://pipe.jspsych.org/api/data", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "*/*"
      },
      body: JSON.stringify({
        experimentID: DATAPIPE_EXPERIMENT_ID,
        filename: filename,
        data: csv
      })
    });
    console.log("fetch() returned:", resp.status);
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }
    const result = await resp.json();
    console.log("DataPipe response:", JSON.stringify(result, null, 2));
    if (!result.success) {
      throw new Error(result.message || "DataPipe upload failed");
    }
    console.log("Upload successful.");
  } catch (err) {
    console.error("DataPipe save failed:", err);
    console.log("Downloading CSV backup...");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    throw err;
  }
}

          ${['Male','Female','Non-binary','Prefer not to say'].map(o =>
            `<label><input type="radio" name="d_gender" value="${o}"> ${o}</label>`
          ).join('')}
        </div>
      </div>

      <div class="form-item">
        <label>What is the highest level of education that you have achieved?</label>
        <div class="radio-group">
          ${["Senior Secondary","Diploma","Bachelor's Degree","Master's Degree","PhD and above"].map(o =>
            `<label><input type="radio" name="d_edu" value="${o}"> ${o}</label>`
          ).join('')}
        </div>
      </div>

      <div class="form-item">
        <label for="d_occ">What is your occupation/specialization?</label>
        <input type="text" id="d_occ" maxlength="100" placeholder="e.g. Student, Engineer…">
      </div>

      <div id="demo-error" class="error-banner">Please fill in all fields before continuing.</div>
    </div>`,
  choices: ['Proceed to IRI form >>'],
  button_html: '<button class="proceed-btn" id="demo-proceed-btn">%choice%</button>',
  response_ends_trial: false,
  on_load: () => {
    document.querySelectorAll('.radio-group input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const group = radio.closest('.radio-group');
        group.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
        radio.closest('label').classList.add('selected');
      });
    });

    document.getElementById('demo-proceed-btn').addEventListener('click', () => {
      const initials = document.getElementById('d_initials').value.trim();
      const age = document.getElementById('d_age').value.trim();
      const gender = document.querySelector('input[name="d_gender"]:checked');
      const edu = document.querySelector('input[name="d_edu"]:checked');
      const occ = document.getElementById('d_occ').value.trim();

      const error = document.getElementById('demo-error');

      if (!initials || !age || !gender || !edu || !occ) {
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';

      allData.demographics = {
        initials,
        age,
        gender: gender.value,
        education: edu.value,
        occupation: occ,
      };

      jsPsych.finishTrial();
    });
  },
};

// ════════════════════════════════════════════════════════
//  3. IRI ROUTINE  (split into pages of 14 for readability)
// ════════════════════════════════════════════════════════
const IRI_PAGE_SIZE = 14;
const iriPages = [];

for (let start = 0; start < IRI_ITEMS.length; start += IRI_PAGE_SIZE) {
  const pageItems = IRI_ITEMS.slice(start, start + IRI_PAGE_SIZE);
  const pageNum = Math.floor(start / IRI_PAGE_SIZE) + 1;
  const totalPages = Math.ceil(IRI_ITEMS.length / IRI_PAGE_SIZE);
  const itemOffset = start;

  iriPages.push({
    type: jsPsychSurveyLikert,
    preamble: `
      <div class="form-page">
        <h2>Interpersonal Reactivity Index (IRI)</h2>
        <p class="form-heading">
          Please indicate how well each statement describes you. There are no right or wrong answers. Scroll down to see all the statements, and make sure you answer each one.
        </p>
        <div class="form-scroll-hint">
          There are a total of 28 questions spread across ${totalPages} pages. You are currently on page ${pageNum} of ${totalPages}.
        </div>
      </div>
    `,
  button_label: pageNum < totalPages
      ? "Next >>"
      : "To main task >>",
    questions: pageItems.map((q, i) => ({
      prompt: q,
      labels: IRI_SCALE,
      required: true,
      name: `iri_${itemOffset + i}`,
    })),
    on_finish: (data) => {
      Object.entries(data.response).forEach(([k, v]) => {
        allData.iri[k] = v;
      });
    }
  });
}
const preloadTrial = {
  type: jsPsychPreload,
  images: [
    "stim/description.png",
    "stim/instructions.png",
    ...TRIALS.flatMap(t => [
      t.scen_ID,
      t.img_1,
      t.img_2,
      t.img_3,
      t.img_4
    ])
  ]
};
// ════════════════════════════════════════════════════════
//  4. INSTRUCTIONS ROUTINE
// ════════════════════════════════════════════════════════
const enterFullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: true,
    message: `
        <h2>Ready to Begin</h2>
        <p>The experiment will now switch to fullscreen mode.</p>
        <p>Please keep the experiment in fullscreen until it has finished.</p>
    `,
    button_label: "Enter Fullscreen"
};
const instructionsTrial = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instructions-container">
      <img src="stim/instructions.png" alt="Task instructions"
           onerror="this.outerHTML='<div style=\'border:1px solid #444;padding:30px;border-radius:6px;max-width:600px;margin:0 auto;text-align:left\'><h3 style=\'margin-top:0\'>Task Instructions</h3><p>In this task you will see a scenario followed by four images. Click the image that best represents your choice for the scenario described.</p><p>Each scenario will be shown first, then you will choose from four images on the next screen.</p></div>'">
      <div class="instructions-hint">Press <strong>SPACE</strong> to begin the task</div>
    </div>`,
  choices: [' '],
};

// ════════════════════════════════════════════════════════
//  5. TRIAL LOOP — scenario + choice per trial
// ════════════════════════════════════════════════════════

// Shuffle trials
const shuffledTrials = shuffleArray(TRIALS);

const trialProcedure = [];

shuffledTrials.forEach((trial, trialIdx) => {

  // 5a. Scenario screen
  trialProcedure.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: () => `
      <div class="scenario-container">
        <img src="${trial.scen_ID}" alt="Scenario ${trial.dil_ID}"
             style="max-width:100%;max-height:78vh;border-radius:4px;"
             onerror="this.outerHTML='<div style=\'border:1px solid #444;padding:20px;border-radius:6px\'>[Scenario image: ${trial.scen_ID}]</div>'">
        <div class="scenario-hint">Press <strong>SPACE</strong> to continue to your choice</div>
      </div>`,
    choices: [' '],
    data: {
      task: 'scenario',
      dil_ID: trial.dil_ID,
      trial_index_in_exp: trialIdx,
    },
  });

  // 5b. Choice screen — 2×2 image grid with mouse tracking
  trialProcedure.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: () => {
      // Randomise position of the 4 images each trial
      const positions = [
        { key: 'A', src: trial.img_1, score: trial.hl_score_1, scenario:trial.scen_ID },
        { key: 'B', src: trial.img_2, score: trial.hl_score_2, scenario:trial.scen_ID },
        { key: 'C', src: trial.img_3, score: trial.hl_score_3, scenario:trial.scen_ID },
        { key: 'D', src: trial.img_4, score: trial.hl_score_4, scenario:trial.scen_ID },
      ];
      // Store for on_finish
      window._currentPositions = positions;

      return `
        <div class="choice-container">
          <div class="choice-grid" id="choice-grid">
            ${positions.map((p, idx) => `
              <div class="choice-img-wrap" id="choice-${idx}" data-key="${p.key}" data-src="${p.src}" data-score="${p.score}">
                <img src="${p.src}" alt="Option ${idx + 1}"
                     onerror="this.outerHTML='<div style=\'height:180px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px\'>[Image: ${p.src}]</div>'">
              </div>
            `).join('')}
          </div>
        </div>`;
    },
    choices: [],                  // no button choices — handled by image clicks
    response_ends_trial: false,
    on_load: () => {
      const mouseTrail = [];
      let trialStart = performance.now();

      // Track mouse movement
      const trackMouse = (e) => {
        mouseTrail.push({
          t: Math.round(performance.now() - trialStart),
          x: e.clientX,
          y: e.clientY,
        });
      };
      document.addEventListener('mousemove', trackMouse);

      // Click handler on each image
      document.querySelectorAll('.choice-img-wrap').forEach(el => {
        el.addEventListener('click', (e)=> {
          document.removeEventListener('mousemove', trackMouse);

          const rt = Math.round(performance.now() - trialStart);
          const chosen = {
            key: el.dataset.key,
            src: el.dataset.src,
            score: parseFloat(el.dataset.score),
          };

          allData.trials.push({
            trial_number: trialIdx + 1,
            dil_ID: trial.dil_ID,
            scen_ID: trial.scen_ID,
            top_left: window._currentPositions[0].src,
            top_right: window._currentPositions[1].src,
            bottom_left: window._currentPositions[2].src,
            bottom_right: window._currentPositions[3].src,
            chosen_img: chosen.src.split('/').pop(),
            chosen_key: chosen.key,
            chosen_hl_score: chosen.score,
            click_x: e.clientX,
            click_y: e.clientY,
            rt_ms: rt,
            mouse_trajectory: JSON.stringify(mouseTrail),
          });

          jsPsych.finishTrial({ response: chosen.key, rt });
        });
      });
    },
  });
});

// ════════════════════════════════════════════════════════
//  6. END ROUTINE
// ════════════════════════════════════════════════════════
const endTrial = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="end-box">
      <p>You have successfully completed this experiment. Thank you for your participation!<br><br>
      Saving your responses...</p>
    </div>`,
  choices: [],
  trial_duration: null,
  response_ends_trial: false,
  on_load: () => {
    setTimeout(async () => {
      const overlay = document.getElementById("saving-overlay");
      try {
        console.log("Entering endTrial");
        console.log("Overlay:", overlay);
        if (overlay) {
          overlay.classList.add("active");
        }
        await saveData();
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        }
        document.querySelector(".end-box p").textContent =
          "Your responses have been successfully saved. Thank you for your patience and participation! 😊 You may now close this tab.";
      } catch (err) {
        console.error("End routine error:", err);
        document.querySelector(".end-box p").textContent =
          "Your responses could not be uploaded to the server. A backup CSV has been downloaded to this device. Please contact the researcher before closing this page.";
      } finally {
        if (overlay) {
          overlay.classList.remove("active");
        }
      }
    }, 800);
  }
};// ════════════════════════════════════════════════════════
//  RUN TIMELINE
// ════════════════════════════════════════════════════════
jsPsych.run([
  preloadTrial,
  consentTrial,
  demographicsValidated,
  ...iriPages,
  enterFullscreen,
  instructionsTrial,
  ...trialProcedure,
  endTrial,
]);
</script>
</body>
</html>
